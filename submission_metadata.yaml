ai_usage_summary: |
  Used Antigravity AI Agent powered by Google Gemini to assist with project scaffolding, Python module refactoring, CSS styling, and debug troubleshooting. No candidate data was sent to external APIs during execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A two-stage Retrieve-and-Rank pipeline optimized for CPU-only execution. Stage 1 applies fast heuristic pre-screening (eliminating honeypots/logical inconsistencies, consulting-firm histories, and inactive profiles with notice periods > 60 days or response rates < 50%), successfully pruning the search space by 98.8% in under 15 seconds. Stage 2 evaluates the remaining 1,124 candidate subset by generating 384-dimensional dense semantic vectors using a local all-MiniLM-L6-v2 Sentence-Transformer, computing cosine similarity, and calculating a weighted 9-signal score matrix (Semantic, Skills, Experience, Projects, Education, Certifications, Career Progression, Behavior, and Activity) modified by qualification penalties to sort the final top-100.

